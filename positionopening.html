<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />

    <meta name="description" content="Position Opening" />
    <meta name="author" content="senli1073" />
    <title>Position Opening - Xujia Li</title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap"
        rel="stylesheet" />

    <!-- Core theme CSS (includes Bootstrap)-->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- YAML parser -->
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">Xujia Li</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="index.html">ABOUT ME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="publications.html">PUBLICATIONS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3 active" href="positionopening.html">POSITION OPENING</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="projects.html">PROJECTS</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section" style="background-image: url('static/assets/img/BIT.jpg'); background-position: center 30%;">
        <div class="top-section-content">
            <div class="container px-5">
                <h2 class="text-white display-3 lh-1 font-alt">Position Opening</h2>
            </div>
        </div>
    </section>

    <!-- Position Opening Content -->
    <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="positionopening">
        <div class="container px-5">
            <div class="main-body" id="positionopening-md"></div>
        </div>
    </section>

    <!-- Footer-->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <!-- Content loader -->
    <script>
        const content_dir = 'contents/';

        // Load config
        fetch(content_dir + 'config.yml')
            .then(response => response.text())
            .then(text => {
                const yml = jsyaml.load(text);
                if (yml['copyright-text']) {
                    document.getElementById('copyright-text').innerHTML = yml['copyright-text'];
                }
            })
            .catch(error => console.log(error));

        // Load position opening markdown
        marked.use({ mangle: false, headerIds: false });
        fetch(content_dir + 'positionopening.md')
            .then(response => response.text())
            .then(markdown => {
                document.getElementById('positionopening-md').innerHTML = marked.parse(markdown);
            })
            .catch(error => console.log(error));
    </script>

</body>

</html>
